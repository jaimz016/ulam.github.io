<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ulam Roulette 🎲</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ea580c">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1046/1046747.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #fdfbf7; }
        .slot-shuffle { animation: shuffle 0.1s infinite linear; }
        @keyframes shuffle {
            0% { transform: translateY(-2px); opacity: 0.8; }
            50% { transform: translateY(2px); opacity: 1; }
            100% { transform: translateY(-2px); opacity: 0.8; }
        }
        .pop-effect { animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop {
            0% { transform: scale(0.8); }
            100% { transform: scale(1); }
        }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #ea580c; border-radius: 10px; }
    </style>
</head>
<body class="pb-20">

    <header class="bg-orange-600 text-white p-6 text-center shadow-lg">
        <h1 class="text-3xl font-extrabold tracking-tighter">ULAM LOTTO 🎰</h1>
        <p class="text-sm font-medium opacity-90 uppercase tracking-widest">Jackpot sa Gutom (180 Recipes!)</p>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-6">
        
        <div class="text-right">
            <button onclick="resetRecipes()" class="text-[10px] text-gray-400 hover:text-red-500 transition uppercase font-bold tracking-widest">Reset to 180 Recipes 🔄</button>
        </div>

        <!-- LOTTO MACHINE -->
        <section class="bg-white p-8 rounded-[2.5rem] shadow-xl border-4 border-orange-100 text-center relative overflow-hidden">
            <h2 class="text-gray-400 text-xs font-bold uppercase tracking-widest mb-6">Piliin ang Bola</h2>
            
            <div class="grid grid-cols-3 gap-4 mb-8">
                <button onclick="spin('Breakfast')" class="group bg-yellow-400 hover:bg-yellow-500 text-white p-4 rounded-2xl shadow-md transition active:scale-90">
                    <span class="block text-2xl">🍳</span>
                    <span class="text-[10px] font-black uppercase">Agahan</span>
                </button>
                <button onclick="spin('Lunch')" class="group bg-orange-500 hover:bg-orange-600 text-white p-4 rounded-2xl shadow-md transition active:scale-90">
                    <span class="block text-2xl">🍚</span>
                    <span class="text-[10px] font-black uppercase">Tanghalian</span>
                </button>
                <button onclick="spin('Dinner')" class="group bg-red-500 hover:bg-red-600 text-white p-4 rounded-2xl shadow-md transition active:scale-90">
                    <span class="block text-2xl">🍲</span>
                    <span class="text-[10px] font-black uppercase">Hapunan</span>
                </button>
            </div>

            <div id="display-screen" class="bg-gray-900 rounded-3xl p-8 min-h-[160px] flex flex-col items-center justify-center border-8 border-gray-800 shadow-inner">
                <div id="slot-container" class="text-center">
                    <p id="instruction-text" class="text-orange-400 text-sm font-mono animate-pulse text-center uppercase">Choose a category</p>
                    <h3 id="meal-name" class="text-2xl font-black text-white leading-tight hidden text-center"></h3>
                </div>
            </div>

            <div id="recipe-details" class="hidden mt-6 text-left p-5 bg-orange-50 rounded-2xl border border-orange-200 pop-effect">
                <div class="space-y-3 text-sm text-gray-800">
                    <p><strong>🛒 Sangkap:</strong> <span id="meal-ingredients" class="text-gray-600 text-xs italic"></span></p>
                    <p><strong>👨‍🍳 Steps:</strong> <div id="meal-steps" class="text-gray-600 text-xs whitespace-pre-line leading-relaxed"></div></p>
                </div>
            </div>
        </section>

        <!-- ACTION BUTTONS -->
        <div class="flex flex-wrap justify-center gap-2 pb-4">
            <button onclick="openModal('inventory-modal')" class="bg-orange-100 hover:bg-orange-200 text-orange-700 px-4 py-2 rounded-full text-[10px] font-bold uppercase tracking-widest transition flex items-center gap-2">
                <span>🧊</span> Ano'ng nasa Ref?
            </button>
            <button onclick="openModal('add-modal')" class="bg-gray-100 hover:bg-gray-200 text-gray-600 px-4 py-2 rounded-full text-[10px] font-bold uppercase tracking-widest transition flex items-center gap-2">
                <span>➕</span> Add Recipe
            </button>
            <button onclick="openModal('manage-modal')" class="bg-gray-100 hover:bg-gray-200 text-gray-600 px-4 py-2 rounded-full text-[10px] font-bold uppercase tracking-widest transition flex items-center gap-2">
                <span>📋</span> Manage List
            </button>
        </div>

        <!-- MODAL SYSTEM -->
        <div id="modal-backdrop" class="hidden fixed inset-0 bg-black/60 z-50 backdrop-blur-sm flex items-center justify-center p-4 overflow-y-auto">
            
            <div id="inventory-modal" class="hidden bg-white w-full max-w-md rounded-[2.5rem] shadow-2xl relative p-8 pop-effect">
                <button onclick="closeModal()" class="absolute top-6 right-6 text-gray-400 hover:text-gray-900 text-2xl font-black">&times;</button>
                <h2 class="text-xl font-black mb-2 text-gray-800 flex items-center gap-2"><span>🔍</span> Ref Search</h2>
                <p class="text-[10px] text-gray-500 mb-6 uppercase font-bold tracking-tight italic">Enter ingredients (e.g. egg, onion, pork)</p>
                <div class="space-y-4">
                    <textarea id="inventory-input" placeholder="Ano ang meron ka?" class="w-full p-5 bg-orange-50 rounded-3xl border-none ring-1 ring-orange-100 focus:ring-2 focus:ring-orange-400 outline-none text-sm" rows="3"></textarea>
                    <button onclick="spinByIngredients()" class="w-full bg-orange-500 text-white font-black py-5 rounded-3xl hover:bg-orange-600 transition shadow-xl shadow-orange-100">FILTER & SPIN 🎰</button>
                </div>
            </div>

            <div id="add-modal" class="hidden bg-white w-full max-w-md rounded-[2.5rem] shadow-2xl relative p-8 pop-effect">
                <button onclick="closeModal()" class="absolute top-6 right-6 text-gray-400 hover:text-gray-900 text-2xl font-black">&times;</button>
                <h2 id="form-title" class="text-xl font-black mb-6 text-gray-800 flex items-center gap-2"><span>📝</span> Bagong Recipe</h2>
                <form id="recipe-form" class="space-y-4">
                    <input type="hidden" id="edit-index" value="-1">
                    <input type="text" id="form-name" placeholder="Ulam Name" class="w-full p-5 bg-gray-50 rounded-3xl border-none ring-1 ring-gray-200 focus:ring-2 focus:ring-orange-400 outline-none text-sm" required>
                    <div class="grid grid-cols-2 gap-3">
                        <select id="form-category" class="p-5 bg-gray-50 rounded-3xl border-none ring-1 ring-gray-200 focus:ring-2 focus:ring-orange-400 outline-none text-xs font-bold uppercase tracking-tight">
                            <option value="Breakfast">Agahan</option>
                            <option value="Lunch">Tanghalian</option>
                            <option value="Dinner">Hapunan</option>
                        </select>
                        <button type="submit" id="save-btn" class="bg-gray-900 text-white font-black rounded-3xl hover:bg-black transition text-sm">SAVE</button>
                    </div>
                    <textarea id="form-ingredients" placeholder="Ingredients..." class="w-full p-5 bg-gray-50 rounded-3xl border-none ring-1 ring-gray-200 focus:ring-2 focus:ring-orange-400 outline-none text-xs" rows="3"></textarea>
                    <textarea id="form-steps" placeholder="Instructions..." class="w-full p-5 bg-gray-50 rounded-3xl border-none ring-1 ring-gray-200 focus:ring-2 focus:ring-orange-400 outline-none text-xs" rows="4"></textarea>
                    <button type="button" id="cancel-edit" onclick="cancelEdit()" class="hidden w-full text-gray-400 text-[10px] font-bold uppercase tracking-widest pt-2">Cancel Edit</button>
                </form>
            </div>

            <div id="manage-modal" class="hidden bg-white w-full max-w-md rounded-[2.5rem] shadow-2xl relative p-8 pop-effect">
                <button onclick="closeModal()" class="absolute top-6 right-6 text-gray-400 hover:text-gray-900 text-2xl font-black">&times;</button>
                <h2 class="text-xl font-black mb-6 text-gray-800">Ulam Database</h2>
                <input type="text" id="search-bar" oninput="renderRecipeList()" placeholder="🔍 Search ulam..." class="w-full mb-4 p-4 bg-gray-50 rounded-2xl ring-1 ring-gray-100 outline-none text-sm">
                <div id="recipe-list-container" class="space-y-2 max-h-[50vh] overflow-y-auto pr-2 custom-scrollbar"></div>
            </div>

        </div>
    </main>

    <script>
        const starterRecipes = [
            // Traditional (1-10)
            { name: "Tortang Talong", category: "Breakfast", ingredients: "Talong, Itlog, Asin", steps: "1. Grill eggplant until charred.\n2. Peel off skin while keeping the stem.\n3. Flatten with a fork.\n4. Dip in beaten eggs with salt.\n5. Pan-fry until golden brown." },
            { name: "Gisadong Corned Beef", category: "Breakfast", ingredients: "Corned Beef, Patatas, Sibuyas", steps: "1. Sauté garlic and onions until fragrant.\n2. Fry potato cubes until soft and slightly golden.\n3. Add corned beef and sauté for 3-5 mins.\n4. Optional: Add a little water for more sauce." },
            { name: "Sardines with Misua", category: "Lunch", ingredients: "Sardinas, Misua, Patola", steps: "1. Sauté garlic and onions.\n2. Add canned sardines and sauté for 1 min.\n3. Pour 2 cups water and let boil.\n4. Add patola slices until tender.\n5. Drop misua noodles and cook for 30 seconds. Season with patis." },
            { name: "Adobong Sitaw", category: "Lunch", ingredients: "Sitaw, Toyo, Suka, Bawang", steps: "1. Sauté garlic until brown.\n2. Add sitaw (string beans) and sauté briefly.\n3. Pour soy sauce, vinegar, and a bit of water.\n4. Simmer until sitaw is tender and sauce reduces. Do not stir immediately after adding vinegar." },
            { name: "Fried Galunggong", category: "Lunch", ingredients: "Galunggong, Asin, Mantika", steps: "1. Clean the fish and pat dry.\n2. Rub with salt inside and out.\n3. Fry in hot oil until very crispy.\n4. Serve with kamatis and bagoong." },
            { name: "Ginisang Monggo", category: "Lunch", ingredients: "Monggo, Malunggay, Tinapa", steps: "1. Boil munggo until soft.\n2. In another pan, sauté garlic, onion, and tinapa flakes.\n3. Add the boiled monggo and malunggay leaves.\n4. Simmer for 5 mins and top with crushed chicharon." },
            { name: "Century Tuna Sisig", category: "Dinner", ingredients: "Tuna, Sibuyas, Mayo, Sili", steps: "1. Drain tuna oil.\n2. Sauté plenty of chopped onions and chili.\n3. Add tuna and cook until slightly toasted.\n4. Turn off heat and mix in mayonnaise and a squeeze of delimiter." },
            { name: "Egg Drop Sopas", category: "Breakfast", ingredients: "Macaroni, Gatas, Itlog", steps: "1. Boil macaroni in water with salt until tender.\n2. Add evaporated milk and stir.\n3. While boiling, slowly pour beaten egg while stirring to create ribbons.\n4. Season with salt and pepper." },
            { name: "Ginisang Sayote", category: "Dinner", ingredients: "Sayote, Garlic, Onion", steps: "1. Sauté garlic and onions.\n2. Add sliced sayote.\n3. Pour a little water and season with patis.\n4. Cook until sayote is crisp-tender. Do not overcook." },
            { name: "Scrambled Egg w/ Kamatis", category: "Breakfast", ingredients: "Itlog, Kamatis, Sibuyas", steps: "1. Sauté onions and tomatoes until very soft and mushy.\n2. Add beaten eggs.\n3. Scramble gently until cooked but still moist." },
            
            // Student Staples (11-20)
            { name: "Ginisang Ampalaya", category: "Lunch", ingredients: "Ampalaya, Itlog, Kamatis", steps: "1. Slice ampalaya thinly and soak in salt water to reduce bitterness.\n2. Sauté garlic, onions, and tomatoes.\n3. Add ampalaya and sauté for 3 mins.\n4. Pour beaten eggs and scramble until set." },
            { name: "Adobong Itlog", category: "Breakfast", ingredients: "Egg, Toyo, Suka", steps: "1. Boil eggs for 10 mins and peel.\n2. Sauté garlic.\n3. Add soy sauce, vinegar, peppercorns, and water.\n4. Simmer the peeled eggs in the sauce for 5 mins until they turn brown." },
            { name: "Pancit Canton with Egg", category: "Dinner", ingredients: "Instant Canton, Itlog", steps: "1. Cook instant noodles as per package.\n2. Boil an egg or fry it sunny-side up.\n3. Mix noodles with seasonings and top with the egg." },
            { name: "Ginisang Repolyo", category: "Lunch", ingredients: "Repolyo, Corned Beef", steps: "1. Sauté onions and corned beef.\n2. Add shredded repolyo (cabbage).\n3. Sauté for 2-3 mins until cabbage is soft." },
            { name: "Fried Tokwa", category: "Dinner", ingredients: "Tokwa, Toyo, Suka", steps: "1. Cube the tofu and pat dry.\n2. Fry in hot oil until all sides are golden.\n3. Serve with soy sauce dip." },
            { name: "Odong with Sardines", category: "Lunch", ingredients: "Odong Noodles, Sardinas", steps: "1. Sauté garlic and sardines.\n2. Add water and boil.\n3. Add odong noodles and cook until tender." },
            { name: "Skinless Longganisa", category: "Breakfast", ingredients: "Longganisa, Sinangag", steps: "1. Fry longganisa until caramelized.\n2. Serve with garlic fried rice." },
            { name: "Ginisang Kalabasa", category: "Lunch", ingredients: "Kalabasa, Sitaw, Bagoong", steps: "1. Sauté squash and sitaw with garlic.\n2. Season with bagoong and simmer until tender." },

            { name: "Gisadong Beef Loaf", category: "Dinner", ingredients: "Beef Loaf, Sibuyas, Itlog", steps: "1. Mash beef loaf.\n2. Sauté with onions and mix in an egg." },

        let recipes = JSON.parse(localStorage.getItem('myRecipes'));
        
        if (!recipes || recipes.length < starterRecipes.length) {
            recipes = starterRecipes;
            localStorage.setItem('myRecipes', JSON.stringify(recipes));
        }

        let selectionHistory = { Breakfast: [], Lunch: [], Dinner: [] };
        const HISTORY_LIMIT = 10; 

        function openModal(modalId) {
            document.getElementById('modal-backdrop').classList.remove('hidden');
            document.getElementById('inventory-modal').classList.add('hidden');
            document.getElementById('add-modal').classList.add('hidden');
            document.getElementById('manage-modal').classList.add('hidden');
            
            document.getElementById(modalId).classList.remove('hidden');
            if (modalId === 'manage-modal') renderRecipeList();
        }

        function closeModal() {
            document.getElementById('modal-backdrop').classList.add('hidden');
            cancelEdit();
        }

        document.getElementById('modal-backdrop').addEventListener('click', (e) => {
            if (e.target.id === 'modal-backdrop') closeModal();
        });

        function spinByIngredients() {
            const input = document.getElementById('inventory-input').value.toLowerCase();
            if (!input.trim()) return alert("Mag-type muna ng ingredients!");

            const userIngs = input.split(',').map(i => i.trim()).filter(i => i !== "");
            const matched = recipes.filter(r => 
                userIngs.some(userIng => r.ingredients.toLowerCase().includes(userIng))
            );

            if (matched.length === 0) {
                alert("Walang nahanap na recipe. Subukan ang ibang sangkap!");
                return;
            }

            closeModal();

            const mealDisplay = document.getElementById('meal-name');
            const instruction = document.getElementById('instruction-text');
            const recipeDetails = document.getElementById('recipe-details');
            const mealSteps = document.getElementById('meal-steps');
            
            instruction.classList.add('hidden');
            recipeDetails.classList.add('hidden');
            mealDisplay.classList.remove('hidden', 'text-yellow-400', 'pop-effect');
            mealDisplay.classList.add('slot-shuffle', 'text-white');

            let counter = 0;
            const maxSpins = 25; 
            const interval = setInterval(() => {
                const randomTemp = recipes[Math.floor(Math.random() * recipes.length)];
                mealDisplay.innerText = randomTemp.name.toUpperCase();
                counter++;
                if (counter >= maxSpins) {
                    clearInterval(interval);
                    const finalMeal = matched[Math.floor(Math.random() * matched.length)];
                    confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                    mealDisplay.innerText = "✨ " + finalMeal.name.toUpperCase() + " ✨";
                    mealDisplay.classList.remove('slot-shuffle', 'text-white');
                    mealDisplay.classList.add('text-yellow-400', 'pop-effect');
                    setTimeout(() => {
                        document.getElementById('meal-ingredients').innerText = finalMeal.ingredients;
                        mealSteps.innerText = finalMeal.steps;
                        recipeDetails.classList.remove('hidden');
                    }, 300);
                }
            }, 80);
        }

        function renderRecipeList() {
            const container = document.getElementById('recipe-list-container');
            const searchTerm = document.getElementById('search-bar').value.toLowerCase();
            container.innerHTML = '';

            recipes.forEach((recipe, index) => {
                if (recipe.name.toLowerCase().includes(searchTerm)) {
                    const item = document.createElement('div');
                    item.className = 'flex justify-between items-center p-4 bg-gray-50 rounded-2xl border border-gray-100 mb-2';
                    item.innerHTML = `
                        <div class="flex-1">
                            <p class="font-black text-gray-800 text-xs">${recipe.name}</p>
                            <p class="text-[8px] text-orange-500 font-bold uppercase tracking-widest">${recipe.category}</p>
                        </div>
                        <div class="flex gap-1">
                            <button onclick="editRecipe(${index})" class="p-2 text-blue-500 hover:bg-blue-50 rounded-xl transition">✏️</button>
                            <button onclick="deleteRecipe(${index})" class="p-2 text-red-500 hover:bg-red-50 rounded-xl transition">🗑️</button>
                        </div>
                    `;
                    container.appendChild(item);
                }
            });
        }

        function deleteRecipe(index) {
            if (confirm(`Buburahin ang "${recipes[index].name}"?`)) {
                recipes.splice(index, 1);
                localStorage.setItem('myRecipes', JSON.stringify(recipes));
                renderRecipeList();
            }
        }

        function editRecipe(index) {
            const recipe = recipes[index];
            document.getElementById('form-title').innerText = "Edit Recipe ✏️";
            document.getElementById('form-name').value = recipe.name;
            document.getElementById('form-category').value = recipe.category;
            document.getElementById('form-ingredients').value = recipe.ingredients;
            document.getElementById('form-steps').value = recipe.steps;
            document.getElementById('edit-index').value = index;
            document.getElementById('save-btn').innerText = "UPDATE";
            document.getElementById('cancel-edit').classList.remove('hidden');
            openModal('add-modal');
        }

        function cancelEdit() {
            document.getElementById('recipe-form').reset();
            document.getElementById('form-title').innerText = "Bagong Recipe 📝";
            document.getElementById('edit-index').value = "-1";
            document.getElementById('save-btn').innerText = "SAVE";
            document.getElementById('cancel-edit').classList.add('hidden');
        }

        function resetRecipes() {
            if(confirm("I-reset ang listahan sa 180 default recipes?")) {
                localStorage.removeItem('myRecipes');
                location.reload();
            }
        }

        function spin(category) {
            const filtered = recipes.filter(r => r.category === category);
            if (filtered.length === 0) return alert("Wala pang laman!");

            let possibleMeals = filtered.filter(r => !selectionHistory[category].includes(r.name));
            if (possibleMeals.length === 0) {
                selectionHistory[category] = [];
                possibleMeals = filtered;
            }

            const mealDisplay = document.getElementById('meal-name');
            const instruction = document.getElementById('instruction-text');
            const recipeDetails = document.getElementById('recipe-details');
            const mealSteps = document.getElementById('meal-steps');
            
            instruction.classList.add('hidden');
            recipeDetails.classList.add('hidden');
            mealDisplay.classList.remove('hidden', 'text-yellow-400', 'pop-effect');
            mealDisplay.classList.add('slot-shuffle', 'text-white');

            let counter = 0;
            const maxSpins = 25; 
            const interval = setInterval(() => {
                const randomTemp = filtered[Math.floor(Math.random() * filtered.length)];
                mealDisplay.innerText = randomTemp.name.toUpperCase();
                counter++;
                if (counter >= maxSpins) {
                    clearInterval(interval);
                    const finalMeal = possibleMeals[Math.floor(Math.random() * possibleMeals.length)];
                    confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#f59e0b', '#ef4444', '#fbbf24', '#ffffff'] });
                    selectionHistory[category].push(finalMeal.name);
                    if (selectionHistory[category].length > HISTORY_LIMIT) selectionHistory[category].shift();
                    mealDisplay.innerText = "✨ " + finalMeal.name.toUpperCase() + " ✨";
                    mealDisplay.classList.remove('slot-shuffle', 'text-white');
                    mealDisplay.classList.add('text-yellow-400', 'pop-effect');
                    setTimeout(() => {
                        document.getElementById('meal-ingredients').innerText = finalMeal.ingredients;
                        mealSteps.innerText = finalMeal.steps;
                        recipeDetails.classList.remove('hidden');
                    }, 300);
                }
            }, 80);
        }

        document.getElementById('recipe-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const editIndex = parseInt(document.getElementById('edit-index').value);
            const recipeData = {
                name: document.getElementById('form-name').value,
                category: document.getElementById('form-category').value,
                ingredients: document.getElementById('form-ingredients').value,
                steps: document.getElementById('form-steps').value
            };
            if (editIndex === -1) {
                recipes.push(recipeData);
                alert("Saved! Jackpot!");
            } else {
                recipes[editIndex] = recipeData;
                alert("Recipe updated!");
            }
            localStorage.setItem('myRecipes', JSON.stringify(recipes));
            closeModal();
        });
    </script>
