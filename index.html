<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ulam Roulette 🎲</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ea580c">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1046/1046747.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #fdfbf7; }
        .slot-shuffle { animation: shuffle 0.1s infinite linear; }
        @keyframes shuffle {
            0% { transform: translateY(-2px); opacity: 0.8; }
            50% { transform: translateY(2px); opacity: 1; }
            100% { transform: translateY(-2px); opacity: 0.8; }
        }
        .pop-effect { animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop {
            0% { transform: scale(0.8); }
            100% { transform: scale(1); }
        }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #ea580c; border-radius: 10px; }
        
        /* Spinning Wheel Styles */
        #wheel-container { position: relative; width: 260px; height: 260px; margin: 0 auto; display: none; }
        #wheel-pointer { 
            position: absolute; top: -10px; left: 50%; transform: translateX(-50%); 
            width: 0; height: 0; border-left: 15px solid transparent; 
            border-right: 15px solid transparent; border-top: 30px solid #ea580c; 
            z-index: 10; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
        }
        .chip { transition: all 0.2s; cursor: pointer; }
        .chip.active { background-color: #ea580c !important; color: white !important; border-color: #ea580c !important; }
    </style>
</head>
<body class="pb-20">

    <header class="bg-orange-600 text-white p-6 text-center shadow-lg">
        <h1 class="text-3xl font-extrabold tracking-tighter">ULAM LOTTO 🎰</h1>
        <p class="text-sm font-medium opacity-90 uppercase tracking-widest">Jackpot sa Gutom (200+ Recipes!)</p>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-6">
        
        <div class="text-right flex justify-between items-center">
            <button onclick="openModal('favorites-modal')" class="text-[10px] text-red-500 hover:scale-105 transition uppercase font-bold tracking-widest flex items-center gap-1">❤️ Paborito (<span id="fav-count">0</span>)</button>
            <button onclick="resetRecipes()" class="text-[10px] text-gray-400 hover:text-red-500 transition uppercase font-bold tracking-widest">Reset 🔄</button>
        </div>

        <!-- LOTTO MACHINE -->
        <section class="bg-white p-8 rounded-[2.5rem] shadow-xl border-4 border-orange-100 text-center relative overflow-hidden">
            <h2 class="text-gray-400 text-xs font-bold uppercase tracking-widest mb-6">Piliin ang Bola</h2>
            
            <div class="grid grid-cols-3 gap-4 mb-8">
                <button onclick="spin('Breakfast')" class="group bg-yellow-400 hover:bg-yellow-500 text-white p-4 rounded-2xl shadow-md transition active:scale-90">
                    <span class="block text-2xl">🍳</span>
                    <span class="text-[10px] font-black uppercase">Agahan</span>
                </button>
                <button onclick="spin('Lunch')" class="group bg-orange-500 hover:bg-orange-600 text-white p-4 rounded-2xl shadow-md transition active:scale-90">
                    <span class="block text-2xl">🍚</span>
                    <span class="text-[10px] font-black uppercase">Tanghalian</span>
                </button>
                <button onclick="spin('Dinner')" class="group bg-red-500 hover:bg-red-600 text-white p-4 rounded-2xl shadow-md transition active:scale-90">
                    <span class="block text-2xl">🍲</span>
                    <span class="text-[10px] font-black uppercase">Hapunan</span>
                </button>
            </div>

            <div id="display-screen" class="bg-gray-900 rounded-3xl p-6 min-h-[160px] flex flex-col items-center justify-center border-8 border-gray-800 shadow-inner relative">
                <div id="wheel-container">
                    <div id="wheel-pointer"></div>
                    <canvas id="wheel-canvas" width="260" height="260"></canvas>
                </div>
                
                <div id="slot-container" class="text-center">
                    <p id="instruction-text" class="text-orange-400 text-sm font-mono animate-pulse text-center uppercase">Choose a category</p>
                    <h3 id="meal-name" class="text-2xl font-black text-white leading-tight hidden text-center"></h3>
                </div>
            </div>

            <div id="recipe-details" class="hidden mt-6 text-left p-5 bg-orange-50 rounded-2xl border border-orange-200 pop-effect relative">
                <button id="fav-toggle-btn" onclick="toggleFavoriteCurrent()" class="absolute top-4 right-4 text-2xl hover:scale-110 transition">🤍</button>
                <div class="space-y-3 text-sm text-gray-800 pr-8">
                    <div id="meal-tags-container" class="flex flex-wrap gap-1 mb-2"></div>
                    <p><strong>🛒 Sangkap:</strong> <span id="meal-ingredients" class="text-gray-600 text-xs italic"></span></p>
                    <p><strong>👨‍🍳 Steps:</strong> <div id="meal-steps" class="text-gray-600 text-xs whitespace-pre-line leading-relaxed"></div></p>
                    <div id="recipe-link-container" class="pt-4 hidden">
                        <a id="meal-link" href="#" target="_blank" class="inline-block bg-orange-500 text-white px-4 py-2 rounded-full text-[10px] font-bold uppercase tracking-widest hover:bg-orange-600 transition">View Full Recipe Online 🌐</a>
                    </div>
                </div>
            </div>
        </section>

        <!-- ACTION BUTTONS -->
        <div class="flex flex-wrap justify-center gap-2 pb-4 relative z-10">
            <button onclick="openModal('inventory-modal')" class="bg-orange-100 hover:bg-orange-200 text-orange-700 px-4 py-2 rounded-full text-[10px] font-bold uppercase tracking-widest transition flex items-center gap-2 shadow-sm active:scale-95">
                <span>🧊</span> Ano'ng nasa Ref?
            </button>
            <button onclick="openModal('add-modal')" class="bg-gray-100 hover:bg-gray-200 text-gray-600 px-4 py-2 rounded-full text-[10px] font-bold uppercase tracking-widest transition flex items-center gap-2 shadow-sm active:scale-95">
                <span>➕</span> Add Recipe
            </button>
            <button onclick="openModal('manage-modal')" class="bg-gray-100 hover:bg-gray-200 text-gray-600 px-4 py-2 rounded-full text-[10px] font-bold uppercase tracking-widest transition flex items-center gap-2 shadow-sm active:scale-95">
                <span>📋</span> Manage List
            </button>
        </div>

    </main>

    <!-- MODAL SYSTEM -->
    <div id="modal-backdrop" class="hidden fixed inset-0 bg-black/60 z-50 backdrop-blur-sm flex items-center justify-center p-4 overflow-y-auto">
        
        <div id="inventory-modal" class="modal-content hidden bg-white w-full max-w-md rounded-[2.5rem] shadow-2xl relative p-8 pop-effect">
            <button onclick="closeModal()" class="absolute top-6 right-6 text-gray-400 hover:text-gray-900 text-2xl font-black">&times;</button>
            <h2 class="text-xl font-black mb-2 text-gray-800 flex items-center gap-2"><span>🔍</span> Ref Search</h2>
            <p class="text-[10px] text-gray-500 mb-4 uppercase font-bold tracking-tight italic">Quick select or type ingredients</p>
            
            <div id="ingredient-chips" class="flex flex-wrap gap-2 mb-4"></div>

            <div class="space-y-4">
                <textarea id="inventory-input" placeholder="Ano ang meron ka? (e.g. egg, onion, pork)" class="w-full p-5 bg-orange-50 rounded-3xl border-none ring-1 ring-orange-100 focus:ring-2 focus:ring-orange-400 outline-none text-sm" rows="3"></textarea>
                <button onclick="spinByIngredients()" class="w-full bg-orange-500 text-white font-black py-5 rounded-3xl hover:bg-orange-600 transition shadow-xl shadow-orange-100">FILTER & SPIN 🎰</button>
            </div>
        </div>

        <div id="favorites-modal" class="modal-content hidden bg-white w-full max-w-md rounded-[2.5rem] shadow-2xl relative p-8 pop-effect">
            <button onclick="closeModal()" class="absolute top-6 right-6 text-gray-400 hover:text-gray-900 text-2xl font-black">&times;</button>
            <h2 class="text-xl font-black mb-6 text-gray-800">❤️ Iyong Paborito</h2>
            <div id="fav-list-container" class="space-y-2 max-h-[40vh] overflow-y-auto pr-2 custom-scrollbar mb-6"></div>
            <button onclick="spinFavorites()" id="spin-fav-btn" class="w-full bg-red-500 text-white font-black py-5 rounded-3xl hover:bg-red-600 transition shadow-xl shadow-red-100 disabled:opacity-50 disabled:cursor-not-allowed">SPIN FAVORITES ❤️</button>
        </div>

        <div id="add-modal" class="modal-content hidden bg-white w-full max-w-md rounded-[2.5rem] shadow-2xl relative p-8 pop-effect">
            <button onclick="closeModal()" class="absolute top-6 right-6 text-gray-400 hover:text-gray-900 text-2xl font-black">&times;</button>
            <h2 id="form-title" class="text-xl font-black mb-6 text-gray-800 flex items-center gap-2"><span>📝</span> Recipe Builder</h2>
            
            <div class="mb-6 p-4 bg-orange-50 rounded-2xl border border-orange-100">
                <label class="block text-[10px] font-black text-orange-600 uppercase mb-2 tracking-widest">✨ Magic Paste (Optional)</label>
                <textarea id="magic-paste" placeholder="Paste full recipe text here to auto-fill..." class="w-full p-3 bg-white rounded-xl border-none ring-1 ring-orange-200 focus:ring-2 focus:ring-orange-400 outline-none text-[10px]" rows="2"></textarea>
                <button onclick="magicParse()" type="button" class="mt-2 w-full bg-white text-orange-600 border border-orange-200 py-2 rounded-xl text-[10px] font-bold hover:bg-orange-100 transition">AUTO-FILL FROM TEXT ✨</button>
            </div>

            <form id="recipe-form" class="space-y-4">
                <input type="hidden" id="edit-index" value="-1">
                <input type="text" id="form-name" placeholder="Ulam Name" class="w-full p-5 bg-gray-50 rounded-3xl border-none ring-1 ring-gray-200 focus:ring-2 focus:ring-orange-400 outline-none text-sm font-bold" required>
                
                <div class="grid grid-cols-2 gap-3">
                    <select id="form-category" class="p-5 bg-gray-50 rounded-3xl border-none ring-1 ring-gray-200 focus:ring-2 focus:ring-orange-400 outline-none text-xs font-bold uppercase tracking-tight">
                        <option value="Breakfast">Agahan</option>
                        <option value="Lunch">Tanghalian</option>
                        <option value="Dinner">Hapunan</option>
                    </select>
                    <button type="submit" id="save-btn" class="bg-gray-900 text-white font-black rounded-3xl hover:bg-black transition text-sm">SAVE RECIPE</button>
                </div>

                <input type="url" id="form-link" placeholder="Recipe Link (URL) - Optional" class="w-full p-4 bg-gray-50 rounded-2xl border-none ring-1 ring-gray-200 focus:ring-2 focus:ring-orange-400 outline-none text-xs">
                
                <textarea id="form-ingredients" placeholder="Ingredients (Separate with commas)" class="w-full p-5 bg-gray-50 rounded-3xl border-none ring-1 ring-gray-200 focus:ring-2 focus:ring-orange-400 outline-none text-xs" rows="3"></textarea>
                <textarea id="form-steps" placeholder="Instructions/Steps..." class="w-full p-5 bg-gray-50 rounded-3xl border-none ring-1 ring-gray-200 focus:ring-2 focus:ring-orange-400 outline-none text-xs" rows="4"></textarea>
                <button type="button" id="cancel-edit" onclick="cancelEdit()" class="hidden w-full text-gray-400 text-[10px] font-bold uppercase tracking-widest pt-2">Cancel Edit</button>
            </form>
        </div>

        <div id="manage-modal" class="modal-content hidden bg-white w-full max-w-md rounded-[2.5rem] shadow-2xl relative p-8 pop-effect">
            <button onclick="closeModal()" class="absolute top-6 right-6 text-gray-400 hover:text-gray-900 text-2xl font-black">&times;</button>
            <h2 class="text-xl font-black mb-6 text-gray-800">Ulam Database</h2>
            <input type="text" id="search-bar" oninput="renderRecipeList()" placeholder="🔍 Search ulam..." class="w-full mb-4 p-4 bg-gray-50 rounded-2xl ring-1 ring-gray-100 outline-none text-sm">
            
            <div id="recipe-list-container" class="space-y-2 max-h-[40vh] overflow-y-auto pr-2 custom-scrollbar mb-6"></div>
            
            <div class="grid grid-cols-2 gap-2 pt-4 border-t border-gray-100">
                <button onclick="exportDatabase()" class="bg-gray-100 hover:bg-gray-200 text-gray-600 py-3 rounded-2xl text-[10px] font-bold uppercase tracking-widest flex items-center justify-center gap-2"><span>📥</span> Backup</button>
                <label class="bg-gray-100 hover:bg-gray-200 text-gray-600 py-3 rounded-2xl text-[10px] font-bold uppercase tracking-widest flex items-center justify-center gap-2 cursor-pointer">
                    <span>📤</span> Restore
                    <input type="file" id="import-file" class="hidden" onchange="importDatabase(event)">
                </label>
            </div>
        </div>

    </div>

    <script>
        const starterRecipes = [
            { name: "Tortang Talong", category: "Breakfast", ingredients: "Talong, Itlog, Asin, Gulay", steps: "1. Grill eggplant.\n2. Dip in beaten eggs.\n3. Pan-fry." },
            { name: "Gisadong Corned Beef", category: "Breakfast", ingredients: "Corned Beef, Patatas, Sibuyas, Bawang", steps: "1. Sauté garlic/onion.\n2. Fry potatoes.\n3. Mix in corned beef." },
            { name: "Sardines with Misua", category: "Lunch", ingredients: "Sardinas, Misua, Patola, Gulay, Bawang", steps: "1. Sauté sardinas.\n2. Add water/patola.\n3. Add misua." },
            { name: "Adobong Sitaw w/ Baboy", category: "Lunch", ingredients: "Sitaw, Baboy, Toyo, Suka, Gulay", steps: "1. Sauté pork and sitaw.\n2. Season with adobo mix." },
            { name: "Fried Galunggong", category: "Lunch", ingredients: "Galunggong, Isda, Asin", steps: "1. Salt and fry." },
            { name: "Ginisang Monggo", category: "Lunch", ingredients: "Monggo, Gulay, Tinapa, Isda", steps: "1. Boil munggo.\n2. Sauté with greens and tinapa." },
            { name: "Century Tuna Sisig", category: "Dinner", ingredients: "Tuna, Isda, Sibuyas, Mayo, Sili", steps: "1. Sauté onions and tuna.\n2. Mix mayo." },
            { name: "Egg Drop Sopas", category: "Breakfast", ingredients: "Macaroni, Gatas, Itlog", steps: "1. Boil macaroni.\n2. Add milk and beaten egg." },
            { name: "Scrambled Egg w/ Kamatis", category: "Breakfast", ingredients: "Itlog, Kamatis, Sibuyas, Gulay", steps: "1. Sauté tomatoes.\n2. Scramble with eggs." },
            { name: "Ginisang Ampalaya", category: "Lunch", ingredients: "Ampalaya, Itlog, Kamatis, Gulay", steps: "1. Sauté ampalaya.\n2. Add eggs." },
            { name: "Chicken & Potato Curry", category: "Lunch", ingredients: "Manok, Patatas, Gata, Gulay", steps: "1. Cook chicken/potatoes in curry gata." },
            { name: "Pork Sinigang w/ Gulay", category: "Dinner", ingredients: "Baboy, Sinigang Mix, Sitaw, Talong, Gulay", steps: "1. Classic sour pork soup." },
            { name: "Nilagang Baka", category: "Dinner", ingredients: "Baka, Patatas, Repolyo, Gulay", steps: "1. Boil beef until tender." },
            { name: "Buttered Shrimp", category: "Dinner", ingredients: "Shrimp, Isda, Butter, Garlic", steps: "1. Sauté shrimp in butter." },
            { name: "Beef Bistek", category: "Dinner", ingredients: "Beef, Toyo, Calamansi, Sibuyas, Baka", steps: "1. Cook marinated beef." },
            { name: "Pork & Potato Adobo", category: "Lunch", ingredients: "Baboy, Patatas, Toyo, Suka", steps: "Classic adobo with soft potatoes." },
            { name: "Sardinas w/ Itlog", category: "Breakfast", ingredients: "Sardinas, Itlog, Sibuyas", steps: "Scrambled eggs with sardines." },
            { name: "Isda w/ Kamatis & Itlog", category: "Lunch", ingredients: "Isda, Kamatis, Itlog, Sibuyas", steps: "Cardillo style fish stew." },
            { name: "Manok w/ Patatas & Kamatis", category: "Lunch", ingredients: "Manok, Patatas, Kamatis, Gulay", steps: "Chicken afritada style." },
            { name: "Corned Beef w/ Itlog", category: "Breakfast", ingredients: "Corned Beef, Itlog, Sibuyas", steps: "Sautéed corned beef with egg." },
            { name: "Ginisang Sitaw w/ Itlog", category: "Lunch", ingredients: "Sitaw, Itlog, Gulay", steps: "Affordable veg and egg sauté." },
            { name: "Baboy w/ Talong & Bagoong", category: "Dinner", ingredients: "Baboy, Talong, Gulay, Sibuyas", steps: "Pork binagoongan with eggplant." },
            { name: "Isda Sinigang w/ Sitaw", category: "Lunch", ingredients: "Isda, Sitaw, Gulay", steps: "Sour fish soup with string beans." },
            { name: "Beef w/ Broccoli & Gulay", category: "Dinner", ingredients: "Baka, Gulay, Sibuyas, Bawang", steps: "Beef stir fry with greens." },
            { name: "Tuna w/ Patatas Omelette", category: "Breakfast", ingredients: "Tuna, Itlog, Patatas", steps: "Hearty morning omelette." },
            { name: "Baboy & Sitaw Adobo", category: "Dinner", ingredients: "Baboy, Sitaw, Gulay", steps: "Pork and veg adobo." },
            { name: "Manok Tinola w/ Gulay", category: "Dinner", ingredients: "Manok, Gulay, Luya", steps: "Healthy ginger chicken soup." },
            { name: "Isda Steak w/ Sibuyas", category: "Lunch", ingredients: "Isda, Sibuyas, Toyo", steps: "Fried fish with onion glaze." },
            { name: "Gisadong Patatas w/ Itlog", category: "Breakfast", ingredients: "Patatas, Itlog, Sibuyas", steps: "Budget potato and egg mash." },
            { name: "Corned Beef w/ Kamatis", category: "Breakfast", ingredients: "Corned Beef, Kamatis, Sibuyas", steps: "Juicy sautéed corned beef." },
            { name: "Baboy Nilaga w/ Patatas", category: "Dinner", ingredients: "Baboy, Patatas, Gulay", steps: "Boiled pork with potatoes." },
            { name: "Isda w/ Talong (Fried)", category: "Lunch", ingredients: "Isda, Talong, Gulay", steps: "Fried fish paired with eggplant." },
            { name: "Tuna w/ Kamatis Pasta", category: "Dinner", ingredients: "Tuna, Kamatis, Sibuyas", steps: "Quick tomato-tuna pasta." },
            { name: "Chicken Adobo w/ Itlog", category: "Lunch", ingredients: "Manok, Itlog, Toyo", steps: "Chicken adobo with boiled eggs." },
            { name: "Tortang Corned Beef", category: "Breakfast", ingredients: "Corned Beef, Itlog, Patatas", steps: "Potato and corned beef omelette." }
        ];

        // Core Logic
        let recipes = JSON.parse(localStorage.getItem('myRecipes')) || starterRecipes;
        let favorites = JSON.parse(localStorage.getItem('favRecipes')) || [];
        let currentWinningMeal = null;

        // Sound System
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playTick() { if (audioCtx.state === 'suspended') audioCtx.resume(); const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.type = 'sine'; osc.frequency.setValueAtTime(400, audioCtx.currentTime); gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1); osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.1); }
        function playWin() { const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.type = 'triangle'; osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(1046.50, audioCtx.currentTime + 0.5); gain.gain.setValueAtTime(0.2, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5); osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.5); }

        // Modal Logic
        function openModal(modalId) {
            document.querySelectorAll('.modal-content').forEach(m => m.classList.add('hidden'));
            document.getElementById('modal-backdrop').classList.remove('hidden');
            document.getElementById(modalId).classList.remove('hidden');
            if (modalId === 'manage-modal') renderRecipeList();
            if (modalId === 'favorites-modal') updateFavUI();
            if (modalId === 'inventory-modal') renderChips();
        }
        function closeModal() { document.getElementById('modal-backdrop').classList.add('hidden'); cancelEdit(); }
        document.getElementById('modal-backdrop').addEventListener('click', (e) => { if (e.target.id === 'modal-backdrop') closeModal(); });

        // Backup Logic
        function exportDatabase() {
            const data = JSON.stringify(recipes, null, 2);
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `ulam-database-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
        }
        function importDatabase(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (confirm(`Import ${imported.length} recipes? This will overwrite current list.`)) {
                        recipes = imported; localStorage.setItem('myRecipes', JSON.stringify(recipes)); location.reload();
                    }
                } catch (err) { alert("Invalid file format!"); }
            };
            reader.readAsText(file);
        }

        // Upgraded Magic Paste Parser
        function magicParse() {
            const raw = document.getElementById('magic-paste').value.trim();
            if (raw.length < 5) return alert("Paste some recipe text first!");

            // 1. Detect format (newlines vs commas)
            let lines = [];
            if (raw.includes('\n')) {
                lines = raw.split('\n').map(l => l.trim()).filter(l => l !== "");
            } else if (raw.includes(',')) {
                lines = raw.split(',').map(l => l.trim()).filter(l => l !== "");
            } else {
                lines = [raw];
            }

            let name = "";
            let ingredients = [];
            let steps = [];
            let mode = "guessing"; // guessing, ing, steps

            const ingKeywords = ["ingredient", "sangkap", "needs", "list"];
            const stepKeywords = ["step", "instruction", "paraan", "direction", "how to"];
            
            // Smart Tagging Map (English to Tag)
            const tagMap = {
                "chicken": "Manok", "pork": "Baboy", "beef": "Baka", "fish": "Isda", "shrimp": "Hipon",
                "egg": "Itlog", "tomato": "Kamatis", "onion": "Sibuyas", "garlic": "Bawang", "potato": "Patatas",
                "vegetable": "Gulay", "cabbage": "Repolyo", "eggplant": "Talong", "beans": "Sitaw"
            };
            let detectedTags = new Set();

            lines.forEach((line, i) => {
                const lowerLine = line.toLowerCase();
                
                // Header detection
                if (ingKeywords.some(k => lowerLine.includes(k)) && lowerLine.length < 20) { mode = "ing"; return; }
                if (stepKeywords.some(k => lowerLine.includes(k)) && lowerLine.length < 20) { mode = "steps"; return; }

                if (mode === "guessing") {
                    // Usually first line is name if it's short and has no numbers
                    if (i === 0 && !/[\d]/.test(line) && line.length < 40) {
                        name = line;
                        mode = "ing"; // Assume next lines are ingredients
                    } else {
                        ingredients.push(line);
                    }
                } else if (mode === "ing") {
                    ingredients.push(line);
                } else if (mode === "steps") {
                    steps.push(line);
                }

                // Auto-tagging logic
                Object.keys(tagMap).forEach(key => {
                    if (lowerLine.includes(key)) detectedTags.add(tagMap[key]);
                });
            });

            // Guess name from ingredients if empty
            if (!name && ingredients.length > 0) {
                const mainIng = ingredients[0].replace(/[0-9\/\. lbs|oz|kg|g|tbsp|tsp|cup|piece|clove|cloves]/g, "").trim();
                name = mainIng.charAt(0).toUpperCase() + mainIng.slice(1) + " Dish";
            }

            // Formatting
            const cleanIngs = ingredients.map(ing => "• " + ing).join("\n");
            const tagsString = Array.from(detectedTags).join(", ");
            
            document.getElementById('form-name').value = name;
            document.getElementById('form-ingredients').value = cleanIngs + (tagsString ? "\n\nTags: " + tagsString : "");
            document.getElementById('form-steps').value = steps.join("\n") || "No steps detected. Please add manually.";
            
            alert("✨ Magic Format Done!\nI've auto-added Tags like '" + tagsString + "' so your search chips will work!");
        }

        // Chips & Inventory
        const commonIngredients = ['Itlog', 'Kamatis', 'Baboy', 'Manok', 'Baka', 'Isda', 'Gulay', 'Talong', 'Sitaw', 'Patatas', 'Sibuyas', 'Tuna', 'Corned Beef', 'Sardinas'];
        function renderChips() {
            const container = document.getElementById('ingredient-chips');
            container.innerHTML = '';
            commonIngredients.forEach(ing => {
                const span = document.createElement('span');
                span.className = 'chip px-3 py-1 bg-gray-100 border border-gray-200 rounded-full text-[10px] font-bold text-gray-600 hover:bg-orange-50';
                span.innerText = ing;
                span.onclick = () => {
                    span.classList.toggle('active');
                    const activeChips = Array.from(document.querySelectorAll('.chip.active')).map(c => c.innerText);
                    document.getElementById('inventory-input').value = activeChips.join(', ');
                };
                container.appendChild(span);
            });
        }

        function spinByIngredients() {
            const input = document.getElementById('inventory-input').value.toLowerCase();
            const userIngs = input.split(',').map(i => i.trim()).filter(i => i !== "");
            if (userIngs.length === 0) return alert("Pumili muna ng sangkap!");
            const matched = recipes.filter(r => {
                const recipeIngs = r.ingredients.toLowerCase();
                return userIngs.every(ui => recipeIngs.includes(ui));
            });
            if (matched.length === 0) return alert("No match found for ALL these ingredients.");
            closeModal(); spin('All', matched);
        }

        // Wheel Animation
        const canvas = document.getElementById('wheel-canvas');
        const ctx = canvas.getContext('2d');
        let currentRotation = 0;
        let isSpinning = false;

        function drawWheel(items) {
            const size = items.length;
            const sliceAngle = (Math.PI * 2) / size;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            items.forEach((item, i) => {
                const angle = currentRotation + i * sliceAngle;
                ctx.beginPath(); ctx.moveTo(130, 130); ctx.arc(130, 130, 120, angle, angle + sliceAngle);
                ctx.fillStyle = i % 2 === 0 ? '#ea580c' : '#fbbf24'; ctx.fill();
                ctx.save(); ctx.translate(130, 130); ctx.rotate(angle + sliceAngle / 2);
                ctx.fillStyle = 'white'; ctx.font = 'bold 10px Inter'; ctx.fillText(item.name.substring(0, 12), 40, 5); ctx.restore();
            });
        }

        function animateWheel(items, targetIndex, callback) {
            const sliceAngle = (Math.PI * 2) / items.length;
            const targetRotation = (Math.PI * 2 * 5) + (Math.PI * 2 - (targetIndex * sliceAngle + sliceAngle / 2));
            let start = null; const duration = 3000; let lastTickAngle = 0;
            function step(timestamp) {
                if (!start) start = timestamp;
                const progress = Math.min((timestamp - start) / duration, 1);
                const easeOut = 1 - Math.pow(1 - progress, 3);
                currentRotation = easeOut * targetRotation;
                if (currentRotation - lastTickAngle > 0.2) { playTick(); lastTickAngle = currentRotation; }
                drawWheel(items);
                if (progress < 1) requestAnimationFrame(step); else { isSpinning = false; callback(); }
            }
            isSpinning = true; requestAnimationFrame(step);
        }

        function spin(category, sourceArray = recipes) {
            if (isSpinning) return;
            const filtered = sourceArray.filter(r => category === 'All' || r.category === category);
            if (filtered.length === 0) return alert("Empty category!");
            
            document.getElementById('wheel-container').style.display = 'block';
            document.getElementById('slot-container').classList.add('hidden');
            document.getElementById('recipe-details').classList.add('hidden');
            document.getElementById('instruction-text').classList.add('hidden');

            const targetIndex = Math.floor(Math.random() * filtered.length);
            const winner = filtered[targetIndex];

            animateWheel(filtered, targetIndex, () => {
                playWin(); confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                const mealDisplay = document.getElementById('meal-name');
                mealDisplay.innerText = "✨ " + winner.name.toUpperCase() + " ✨";
                mealDisplay.classList.remove('hidden'); document.getElementById('slot-container').classList.remove('hidden');
                currentWinningMeal = winner;
                document.getElementById('fav-toggle-btn').innerText = favorites.some(f => f.name === winner.name) ? '❤️' : '🤍';
                document.getElementById('meal-ingredients').innerText = winner.ingredients;
                document.getElementById('meal-steps').innerText = winner.steps;
                
                const linkCont = document.getElementById('recipe-link-container');
                if (winner.link) { document.getElementById('meal-link').href = winner.link; linkCont.classList.remove('hidden'); }
                else { linkCont.classList.add('hidden'); }
                
                document.getElementById('recipe-details').classList.remove('hidden');
            });
        }

        // Favorites
        function updateFavUI() {
            document.getElementById('fav-count').innerText = favorites.length;
            const container = document.getElementById('fav-list-container');
            container.innerHTML = favorites.length === 0 ? '<p class="text-center text-gray-400 py-8 text-xs">Wala pang paborito.</p>' : '';
            favorites.forEach((fav, i) => {
                const div = document.createElement('div'); div.className = 'flex justify-between items-center p-3 bg-red-50 rounded-2xl border border-red-100';
                div.innerHTML = `<span class="text-xs font-bold text-gray-800">${fav.name}</span><button onclick="removeFavorite(${i})" class="text-red-500">🗑️</button>`;
                container.appendChild(div);
            });
            document.getElementById('spin-fav-btn').disabled = favorites.length < 2;
        }
        function toggleFavoriteCurrent() {
            if (!currentWinningMeal) return;
            const idx = favorites.findIndex(f => f.name === currentWinningMeal.name);
            if (idx === -1) { favorites.push(currentWinningMeal); document.getElementById('fav-toggle-btn').innerText = '❤️'; }
            else { favorites.splice(idx, 1); document.getElementById('fav-toggle-btn').innerText = '🤍'; }
            localStorage.setItem('favRecipes', JSON.stringify(favorites)); updateFavUI();
        }
        function removeFavorite(i) { favorites.splice(i, 1); localStorage.setItem('favRecipes', JSON.stringify(favorites)); updateFavUI(); }
        function spinFavorites() { closeModal(); spin('All', favorites); }

        // Manage Recipes
        function renderRecipeList() {
            const container = document.getElementById('recipe-list-container');
            const searchTerm = document.getElementById('search-bar').value.toLowerCase();
            container.innerHTML = '';
            recipes.forEach((recipe, index) => {
                if (recipe.name.toLowerCase().includes(searchTerm)) {
                    const item = document.createElement('div'); item.className = 'flex justify-between items-center p-4 bg-gray-50 rounded-2xl border border-gray-100 mb-2';
                    item.innerHTML = `<div class="flex-1"><p class="font-black text-gray-800 text-xs">${recipe.name}</p><p class="text-[8px] text-orange-500 font-bold uppercase tracking-widest">${recipe.category}</p></div><div class="flex gap-1"><button onclick="editRecipe(${index})" class="p-2 text-blue-500 rounded-xl transition">✏️</button><button onclick="deleteRecipe(${index})" class="p-2 text-red-500 rounded-xl transition">🗑️</button></div>`;
                    container.appendChild(item);
                }
            });
        }
        function deleteRecipe(index) { if (confirm(`Burahin?`)) { recipes.splice(index, 1); localStorage.setItem('myRecipes', JSON.stringify(recipes)); renderRecipeList(); } }
        function editRecipe(index) {
            const r = recipes[index]; document.getElementById('form-name').value = r.name; document.getElementById('form-category').value = r.category;
            document.getElementById('form-ingredients').value = r.ingredients; document.getElementById('form-steps').value = r.steps;
            document.getElementById('form-link').value = r.link || ""; document.getElementById('edit-index').value = index;
            document.getElementById('save-btn').innerText = "UPDATE RECIPE"; openModal('add-modal');
        }
        function cancelEdit() { document.getElementById('recipe-form').reset(); document.getElementById('magic-paste').value = ""; document.getElementById('edit-index').value = "-1"; document.getElementById('save-btn').innerText = "SAVE RECIPE"; }
        function resetRecipes() { if(confirm("Reset to default 200+ list?")) { localStorage.removeItem('myRecipes'); location.reload(); } }

        document.getElementById('recipe-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const editIndex = parseInt(document.getElementById('edit-index').value);
            const data = {
                name: document.getElementById('form-name').value, category: document.getElementById('form-category').value,
                ingredients: document.getElementById('form-ingredients').value, steps: document.getElementById('form-steps').value,
                link: document.getElementById('form-link').value
            };
            if (editIndex === -1) recipes.push(data); else recipes[editIndex] = data;
            localStorage.setItem('myRecipes', JSON.stringify(recipes)); closeModal();
        });

        updateFavUI(); renderChips();
    </script>
</body>
</html>
